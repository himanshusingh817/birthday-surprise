<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(120deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    .container {
        text-align: center;
        color: white;
    }

    h1 {
        font-size: 2.5em;
        animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #fff; }
        to { text-shadow: 0 0 25px #ff4d6d; }
    }

    img {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        margin: 20px 0;
        border: 4px solid white;
        object-fit: cover;
    }

    button {
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        border-radius: 25px;
        background: #ff4d6d;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #ff1e4d;
    }

    .hidden {
        display: none;
    }

    .message {
        margin-top: 20px;
        font-size: 1.4em;
    }

    .heart {
        position: absolute;
        color: red;
        animation: float 5s linear infinite;
    }

    @keyframes float {
        0% { transform: translateY(100vh); opacity: 1; }
        100% { transform: translateY(-10vh); opacity: 0; }
    }
</style>
</head>

<body>

<!-- 🎵 Background Music -->
<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container">

    <!-- 💖 Change name here -->
    <h1>🎉 Happy Birthday, Bhawna(kitto) ❤️</h1>


    <button onclick="showMessage()">Click for Surprise 🎁</button>

    <div id="msg" class="message hidden">
        💖 Happy Birthday, dear kitto 💖 <br><br>
        You make my life beautiful 🌸 <br><br>
        I’m so lucky to have you ❤️ <br><br>
        Your love is the sweetest song my heart will ever sing. On your birthday, I celebrate you and our beautiful journey<br><br>
        Love you forever 💕
    </div>

</div>

<script>
function showMessage() {
    document.getElementById("msg").classList.remove("hidden");

    // 🎵 Play Music
    document.getElementById("bgMusic").play();

    startHearts();
}

function startHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.innerHTML = "❤️";
        heart.classList.add("heart");

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 10) + "px";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }, 300);
}
</script>

</body>
</html>
